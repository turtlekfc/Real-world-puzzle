<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🐚 實境解謎</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Fredoka+One&display=swap');
:root{
  --primary:#1a6fa3;--primary-dark:#0d4f7a;--primary-light:#2a9fd6;--primary-pale:#e0f2fb;
  --sand:#f5c87a;--sand-dark:#e0a030;--coral:#f07050;--green:#3db87a;
  --text:#1a3a5c;--text-light:#5a8aaa;--bg:#d4eaf5;--radius:16px;
  --shadow:0 4px 20px rgba(26,111,163,0.15);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);min-height:100vh;color:var(--text);overflow-x:hidden}
.screen{display:none;min-height:100vh;flex-direction:column}.screen.active{display:flex}

/* LOGIN */
#loginScreen{background:linear-gradient(160deg,var(--primary-dark) 0%,var(--primary) 60%,var(--primary-light) 100%);align-items:center;justify-content:center;padding:24px}
.login-box{background:rgba(255,255,255,0.96);border-radius:28px;padding:28px 24px;width:100%;max-width:360px;box-shadow:0 12px 48px rgba(0,0,0,0.25)}
.login-logo{text-align:center;margin-bottom:20px}
.login-logo svg{width:90px;height:72px}
.login-logo h1{font-family:'Fredoka One',cursive;font-size:22px;color:var(--primary);line-height:1.3;margin-top:8px}
.login-logo p{font-size:11px;color:var(--text-light);letter-spacing:2px;margin-top:3px}
.login-welcome{font-size:13px;color:var(--text-light);text-align:center;margin-bottom:16px;line-height:1.6;background:var(--primary-pale);border-radius:10px;padding:10px 14px}
.field-label{font-size:12px;color:var(--text-light);font-weight:500;margin-bottom:5px;margin-top:12px}
select,input[type="password"]{width:100%;padding:11px 13px;border:2px solid #cde7f5;border-radius:12px;font-size:15px;font-family:'Noto Sans TC',sans-serif;color:var(--text);background:#f5fafd;outline:none;transition:border-color 0.2s}
select:focus,input:focus{border-color:var(--primary-light)}
.btn-login{width:100%;padding:13px;background:linear-gradient(90deg,var(--primary),var(--primary-light));color:white;border:none;border-radius:14px;font-size:15px;font-weight:700;font-family:'Noto Sans TC',sans-serif;cursor:pointer;margin-top:18px;box-shadow:0 4px 14px rgba(26,111,163,0.3)}
.btn-login:active{transform:scale(0.97)}
.error-msg{color:var(--coral);font-size:12px;margin-top:7px;text-align:center;min-height:16px}

/* PAUSED */
#pausedScreen{background:linear-gradient(160deg,var(--primary-dark),var(--primary));align-items:center;justify-content:center;padding:32px;text-align:center}
.paused-box{background:rgba(255,255,255,0.95);border-radius:24px;padding:36px 28px;max-width:320px}
.paused-icon{font-size:56px;margin-bottom:14px}
.paused-title{font-size:22px;font-weight:700;color:var(--primary);margin-bottom:8px}
.paused-msg{font-size:14px;color:var(--text-light);line-height:1.6}

/* GAME */
#gameScreen{background:var(--bg)}
.game-header{background:linear-gradient(135deg,var(--primary-dark),var(--primary));overflow:hidden}
.header-art{width:100%;display:block}
.header-info{padding:8px 14px 10px;display:flex;align-items:center;justify-content:space-between}
.team-dot{width:8px;height:8px;border-radius:50%;background:#6ee89a}
.team-name{color:white;font-weight:700;font-size:14px}
.stage-label{color:rgba(255,255,255,0.7);font-size:11px}
.timers{display:flex;gap:7px;padding:0 12px 10px}
.timer-card{flex:1;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.2);border-radius:10px;padding:6px 8px;text-align:center}
.timer-card .label{color:rgba(255,255,255,0.65);font-size:9px}
.timer-card .value{color:white;font-size:17px;font-weight:700;font-family:monospace}
.timer-card .value.warn{color:#ffd04a}
.progress-bar{display:flex;align-items:center;gap:5px;padding:8px 12px 12px}
.prog-dot{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,0.25);border:1.5px solid rgba(255,255,255,0.35);transition:all 0.3s}
.prog-dot.done{background:white;border-color:white}
.prog-dot.active{background:var(--sand);border-color:var(--sand-dark);width:13px;height:13px}
.prog-label{color:rgba(255,255,255,0.65);font-size:10px;margin-left:3px}
.game-content{flex:1;padding:12px;overflow-y:auto}
.state-card{background:white;border-radius:var(--radius);padding:16px;margin-bottom:10px;box-shadow:var(--shadow)}

/* GPS */
.gps-card{text-align:center;border:2px dashed #b8ddf0}
.gps-icon{font-size:44px;margin-bottom:6px}
.gps-title{font-size:15px;font-weight:700;color:var(--primary);margin-bottom:5px}
.gps-desc{font-size:13px;color:var(--text-light);line-height:1.5;margin-bottom:14px}
.gps-status{font-size:12px;color:var(--text-light);margin-top:10px;min-height:18px;line-height:1.5}
.btn-gps{padding:11px 22px;background:var(--green);color:white;border:none;border-radius:12px;font-size:14px;font-weight:700;font-family:'Noto Sans TC',sans-serif;cursor:pointer;box-shadow:0 3px 10px rgba(61,184,122,0.3)}
.btn-gps:disabled{opacity:0.6;cursor:not-allowed}

/* QUESTION */
.q-tag{display:inline-block;background:var(--primary-pale);color:var(--primary);font-size:10px;font-weight:700;border-radius:7px;padding:2px 9px;margin-bottom:8px}
.q-title{font-size:15px;font-weight:700;line-height:1.6;margin-bottom:4px}
.q-desc{font-size:13px;color:var(--text-light);line-height:1.6;margin-bottom:12px}
.q-image{width:100%;border-radius:10px;margin-bottom:12px;object-fit:cover;max-height:180px}

/* HINT */
.hint-box{background:#fffbe6;border:1.5px solid #f5c842;border-radius:10px;padding:10px 13px;margin-bottom:10px;font-size:13px;color:#7a5a00;line-height:1.5}
.hint-label{font-size:10px;font-weight:700;color:#b08000;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px}

/* PHOTO */
.photo-upload-area{border:2px dashed #90c8e8;border-radius:12px;padding:14px;text-align:center;cursor:pointer;transition:background 0.2s;margin-bottom:10px}
.photo-upload-area:hover{background:#f0f8fd}
.photo-upload-area .icon{font-size:28px;margin-bottom:5px}
.photo-upload-area .text{font-size:12px;color:var(--text-light)}
.photo-preview{width:100%;border-radius:10px;margin-bottom:10px;max-height:180px;object-fit:cover;display:none}
#photoInput{display:none}

/* OPTIONS */
.options-list{display:flex;flex-direction:column;gap:7px;margin-bottom:12px}
.option-btn{display:flex;align-items:flex-start;gap:9px;padding:11px 12px;background:#f5fafd;border:2px solid #c8e4f5;border-radius:12px;cursor:pointer;font-size:13px;color:var(--text);line-height:1.5;transition:all 0.15s;text-align:left;width:100%;font-family:'Noto Sans TC',sans-serif}
.option-btn:hover{border-color:var(--primary-light);background:#e8f4fc}
.option-btn.selected{border-color:var(--sand-dark);background:#fff8e6}
.option-btn.correct{border-color:var(--green);background:#eaf7ee}
.option-btn.wrong{border-color:var(--coral);background:#fff0ee}
.opt-letter{min-width:24px;height:24px;border-radius:50%;background:#daeef8;color:var(--primary);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.option-btn.selected .opt-letter{background:var(--sand);color:white}
.option-btn.correct .opt-letter{background:var(--green);color:white}
.option-btn.wrong .opt-letter{background:var(--coral);color:white}
.btn-submit{width:100%;padding:13px;background:linear-gradient(90deg,var(--primary),var(--primary-light));color:white;border:none;border-radius:13px;font-size:14px;font-weight:700;font-family:'Noto Sans TC',sans-serif;cursor:pointer;box-shadow:0 4px 12px rgba(26,111,163,0.25)}
.btn-submit:disabled{opacity:0.5;cursor:not-allowed}

/* FEEDBACK */
.feedback-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:100;padding:24px}
.feedback-box{background:white;border-radius:22px;padding:28px 22px;text-align:center;max-width:310px;width:100%;box-shadow:0 16px 48px rgba(0,0,0,0.3)}
.feedback-icon{font-size:56px;margin-bottom:10px}
.feedback-title{font-size:20px;font-weight:900;margin-bottom:6px}
.feedback-title.correct{color:var(--green)}.feedback-title.wrong{color:var(--coral)}
.feedback-msg{font-size:13px;color:var(--text-light);line-height:1.6;margin-bottom:18px}
.btn-next{width:100%;padding:13px;background:linear-gradient(90deg,var(--green),#5dd490);color:white;border:none;border-radius:13px;font-size:14px;font-weight:700;font-family:'Noto Sans TC',sans-serif;cursor:pointer}
.btn-retry{width:100%;padding:13px;background:linear-gradient(90deg,var(--coral),#f09070);color:white;border:none;border-radius:13px;font-size:14px;font-weight:700;font-family:'Noto Sans TC',sans-serif;cursor:pointer}

/* FINISH */
#finishScreen{background:linear-gradient(160deg,var(--primary-dark),var(--primary),var(--primary-light));align-items:center;justify-content:center;padding:28px;text-align:center}
.finish-box{background:rgba(255,255,255,0.96);border-radius:28px;padding:32px 24px;max-width:340px;width:100%}
.finish-icon{font-size:64px;margin-bottom:14px}
.finish-title{font-family:'Fredoka One',cursive;font-size:26px;color:var(--primary);margin-bottom:6px}
.finish-team{font-size:14px;color:var(--text-light);margin-bottom:20px}
.finish-stats{display:flex;gap:10px;margin-bottom:20px}
.stat-box{flex:1;background:var(--primary-pale);border-radius:10px;padding:12px 6px;text-align:center}
.stat-label{font-size:10px;color:var(--text-light);margin-bottom:3px}
.stat-value{font-size:20px;font-weight:700;color:var(--primary)}
.finish-msg{font-size:13px;color:var(--text-light);line-height:1.7}

/* UTILS */
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,0.88);display:flex;align-items:center;justify-content:center;z-index:200;flex-direction:column;gap:10px;font-size:13px;color:var(--primary)}
.spinner{width:38px;height:38px;border:4px solid var(--primary-pale);border-top-color:var(--primary);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.hidden{display:none!important}
</style>
</head>
<body>

<div id="loginScreen" class="screen active">
  <div class="login-box">
    <div class="login-logo">
      <svg viewBox="0 0 100 80" xmlns="http://www.w3.org/2000/svg">
        <rect width="100" height="80" fill="#1a6fa3" rx="12"/>
        <rect x="25" y="42" width="50" height="32" fill="#e8f4f8" rx="3"/>
        <polygon points="18,42 50,18 82,42" fill="#2abde0"/>
        <rect x="30" y="50" width="12" height="10" fill="#b8e4f7" rx="2"/>
        <rect x="44" y="50" width="12" height="10" fill="#b8e4f7" rx="2"/>
        <rect x="58" y="50" width="12" height="10" fill="#b8e4f7" rx="2"/>
        <rect x="43" y="57" width="14" height="17" fill="#7dd4f8" rx="2"/>
        <ellipse cx="50" cy="20" rx="10" ry="8" fill="#f5c87a" transform="rotate(-20,50,20)"/>
        <path d="M44,14 Q50,6 57,13 Q62,19 57,23 Q50,27 44,23 Q40,19 44,14" fill="none" stroke="#e08030" stroke-width="1.5" stroke-linecap="round"/>
        <ellipse cx="46" cy="17" rx="3" ry="2.5" fill="#f0a84a" transform="rotate(-20,46,17)"/>

      </svg>

    <input type="password" id="teamPassword" placeholder="請輸入密碼"/>

<div id="pausedScreen" class="screen">
  <div class="paused-box">

    <div class="paused-msg">活動暫時暫停，請稍候工作人員通知後繼續。</div>
  </div>
</div>

<div id="gameScreen" class="screen">
  <div class="game-header">
    <svg id="headerArt" class="header-art" viewBox="0 0 390 72" xmlns="http://www.w3.org/2000/svg">
      <rect width="390" height="72" fill="#0d4f7a"/>
      <rect x="130" y="40" width="130" height="30" fill="#e8f4f8" rx="3"/>
      <polygon points="118,40 195,16 262,40" fill="#2abde0"/>
      <rect x="140" y="47" width="17" height="12" fill="#b8e4f7" rx="2"/>
      <rect x="165" y="47" width="17" height="12" fill="#b8e4f7" rx="2"/>
      <rect x="190" y="47" width="17" height="12" fill="#b8e4f7" rx="2"/>
      <rect x="166" y="55" width="15" height="15" fill="#7dd4f8" rx="2"/>
      <rect x="133" y="43" width="124" height="6" fill="#1a9dd0" rx="1.5"/>
      <text id="headerBuildingText" x="195" y="48" text-anchor="middle" font-size="4.5" fill="white" font-weight="700" font-family="sans-serif">新屋海螺館</text>
      <ellipse cx="195" cy="20" rx="13" ry="10" fill="#f5c87a" transform="rotate(-20,195,20)"/>
      <path d="M188,13 Q195,5 202,12 Q208,18 202,23 Q195,28 188,23 Q184,18 188,13" fill="none" stroke="#e08030" stroke-width="1.5" stroke-linecap="round"/>
      <ellipse cx="191" cy="17" rx="4" ry="3" fill="#f0a84a" transform="rotate(-20,191,17)"/>
      <path d="M202,11 Q210,3 208,2 Q206,1 204,10" fill="#f5c87a"/>
      <ellipse cx="55" cy="52" rx="10" ry="7" fill="#f7a350"/>
      <polygon points="65,52 72,46 72,58" fill="#f7a350"/>
      <circle cx="51" cy="50" r="1.5" fill="white"/><circle cx="51" cy="50" r="0.8" fill="#222"/>
      <ellipse cx="330" cy="54" rx="8" ry="5.5" fill="#7dd4f8"/>
      <polygon points="338,54 344,50 344,58" fill="#7dd4f8"/>
      <circle cx="327" cy="52" r="1.2" fill="white"/><circle cx="327" cy="52" r="0.6" fill="#222"/>
      <path d="M28,72 Q24,60 30,50 Q36,42 32,34" fill="none" stroke="#3db87a" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M360,72 Q364,60 358,50 Q352,42 356,34" fill="none" stroke="#3db87a" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M0,62 Q48,56 97,62 Q146,68 195,62 Q244,56 292,62 Q341,68 390,62 L390,72 L0,72 Z" fill="#1a90c8" opacity="0.5"/>
    </svg>
    <div class="header-info">
      <div style="display:flex;align-items:center;gap:7px">
        <div class="team-dot" id="teamDot"></div>
        <div>
          <div class="team-name" id="displayTeamName"></div>
          <div class="stage-label" id="displayStageLabel">第 1 關</div>
        </div>
      </div>
      <div style="text-align:right">
        <div style="color:rgba(255,255,255,0.65);font-size:10px">進度</div>
        <div style="color:white;font-size:13px;font-weight:700" id="displayProgress">1/?</div>
      </div>
    </div>
    <div class="timers">
      <div class="timer-card"><div class="label">⏱ 本關</div><div class="value warn" id="stageTimer">00:00</div></div>
      <div class="timer-card"><div class="label">🕐 總計</div><div class="value" id="totalTimer">00:00</div></div>
    </div>
    <div class="progress-bar" id="progressBar"></div>
  </div>
  <div class="game-content" id="gameContent"></div>
</div>

<div id="finishScreen" class="screen">
  <div class="finish-box">
    <div class="finish-icon">🏆</div>
    <div class="finish-title">闖關完成！</div>
    <div class="finish-team" id="finishTeamName"></div>
    <div class="finish-stats">
      <div class="stat-box"><div class="stat-label">關卡數</div><div class="stat-value" id="finishStages">-</div></div>
      <div class="stat-box"><div class="stat-label">總時間</div><div class="stat-value" id="finishTime">-</div></div>
      <div class="stat-box"><div class="stat-label">答題次數</div><div class="stat-value" id="finishAttempts">-</div></div>
    </div>
    <div class="finish-msg" id="finishMsg">🐚 恭喜完成所有挑戰！</div>
  </div>
</div>

<div class="loading-overlay hidden" id="loadingOverlay">
  <div class="spinner"></div><div id="loadingMsg">載入中...</div>
</div>

<div class="feedback-overlay hidden" id="feedbackOverlay">
  <div class="feedback-box">
    <div class="feedback-icon" id="feedbackIcon">🎉</div>
    <div class="feedback-title" id="feedbackTitle"></div>
    <div class="feedback-msg" id="feedbackMsg"></div>
    <button id="feedbackBtn" onclick="closeFeedback()">繼續</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get, set, push, onValue, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import { getStorage, ref as sRef, uploadBytes, getDownloadURL }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyA51pVs3QZJ3p6eIeVpMVOGqFlNXExEjKo",
  authDomain: "real-world-puzzle-d5efc.firebaseapp.com",
  databaseURL: "https://real-world-puzzle-d5efc-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "real-world-puzzle-d5efc",
  storageBucket: "real-world-puzzle-d5efc.firebasestorage.app",
  messagingSenderId: "25902212869",
  appId: "1:25902212869:web:8955631b9c9395233a796c"
};
const fbApp = initializeApp(firebaseConfig);
const db = getDatabase(fbApp);
const storage = getStorage(fbApp);

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

let state = {
  teamKey:null, teamName:null, teamColor:null, stages:[],
  currentIdx:0, stageSeconds:0, totalSeconds:0,
  gameStartTime:null, timerInterval:null,
  selectedOption:null, totalAttempts:0, stageAttempts:0,
  photoFile:null, sessionKey:null, lastCorrect:false,
  settings:{}, gpsLogCount:0
};

window.doLogin=doLogin; window.checkGPS=checkGPS; window.selectOpt=selectOpt;
window.submitAns=submitAns; window.closeFeedback=closeFeedback;
window.triggerPhoto=triggerPhoto; window.handlePhoto=handlePhoto;

function showLoading(msg='載入中...'){document.getElementById('loadingMsg').textContent=msg;document.getElementById('loadingOverlay').classList.remove('hidden')}
function hideLoading(){document.getElementById('loadingOverlay').classList.add('hidden')}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}

// 載入設定與主題
async function initLogin() {
  try {
    const [cfgSnap, themeSnap] = await Promise.all([
      get(ref(db,'config/settings')),
      get(ref(db,'config/settings/theme'))
    ]);
    const cfg = cfgSnap.val() || {};
    state.settings = cfg;
    if (themeSnap.exists()) {
      const t = themeSnap.val();
      document.documentElement.style.setProperty('--primary', t.primary);
      document.documentElement.style.setProperty('--primary-dark', t.dark);
      document.documentElement.style.setProperty('--primary-light', t.light);
    }
    if (cfg.activityName) {
      document.getElementById('loginTitle').textContent = cfg.activityName;
      document.title = cfg.activityName;
    }
    if (cfg.subtitle) document.getElementById('loginSubtitle').textContent = cfg.subtitle;
    if (cfg.welcome) {
      const w = document.getElementById('loginWelcome');
      w.textContent = cfg.welcome; w.classList.remove('hidden');
    }
    const sel = document.getElementById('teamSelect');
    const teams = cfg.teams || {};
    const count = cfg.teamCount || 4;
    for (let i=0; i<count; i++) {
      const key = `team${i+1}`;
      const t = teams[key] || {};
      const opt = document.createElement('option');
      opt.value = key;
      opt.textContent = t.name || `隊伍${i+1}`;
      sel.appendChild(opt);
    }
  } catch(e) { console.warn('設定載入失敗', e); }
}
initLogin();

// 監聽活動狀態
onValue(ref(db,'config/activityStatus'), snap => {
  const status = snap.val() || 'closed';
  if (status === 'paused' && state.sessionKey) {
    clearInterval(state.timerInterval);
    showScreen('pausedScreen');
  } else if (status === 'open' && state.sessionKey) {
    if (!document.getElementById('gameScreen').classList.contains('active')) {
      showScreen('gameScreen');
      state.timerInterval = setInterval(tickTimer, 1000);
    }
  }
});

async function doLogin() {
  const teamKey = document.getElementById('teamSelect').value;
  const pass = document.getElementById('teamPassword').value.trim();
  const errEl = document.getElementById('loginError');
  errEl.textContent = '';
  if (!teamKey) { errEl.textContent = '請選擇隊伍！'; return; }
  if (!pass) { errEl.textContent = '請輸入密碼！'; return; }
  showLoading('驗證中...');
  try {
    // 檢查活動狀態
    const statusSnap = await get(ref(db,'config/activityStatus'));
    if ((statusSnap.val()||'closed') === 'closed') {
      hideLoading(); errEl.textContent = '活動尚未開始，請等待工作人員通知！'; return;
    }
    // 驗證密碼
    const cfg = state.settings;
    const teamCfg = (cfg.teams||{})[teamKey] || {};
    if (pass !== (teamCfg.password||'1234')) {
      hideLoading(); errEl.textContent = '密碼錯誤！'; return;
    }
    // 讀取關卡（不含答案）
    const snap = await get(ref(db,'stages'));
    if (!snap.exists()) { hideLoading(); errEl.textContent = '尚未建立關卡，請聯絡管理者！'; return; }
    let arr = Object.entries(snap.val()).map(([k,v]) => {
      const {answerIndex,...safe} = v;
      return {key:k, answerHash:v.answerHash||'', ...safe};
    });
    arr.sort((a,b)=>(a.order||0)-(b.order||0));
    const routeMode = cfg.routeMode || 'random';
    state.stages = routeMode==='random' ? shuffleForTeam(arr,teamKey) : arr;
    state.teamKey = teamKey;
    state.teamName = teamCfg.name || `隊伍${teamKey.replace('team','')}`;
    state.teamColor = teamCfg.color || '#6ee89a';
    state.settings = cfg;
    state.currentIdx=0; state.totalAttempts=0; state.stageAttempts=0;
    state.gameStartTime=Date.now(); state.gpsLogCount=0;

    const sessRef = push(ref(db,'sessions'));
    state.sessionKey = sessRef.key;
    await set(sessRef, {
      teamKey, teamName:state.teamName,
      startTime:serverTimestamp(), currentStage:0,
      totalStages:state.stages.length,
      stageOrder:state.stages.map(s=>s.key),
      status:'playing', stageLogs:{}, gpsLogs:{}
    });
    hideLoading();
    showScreen('gameScreen');
    document.getElementById('teamDot').style.background = state.teamColor;
    document.getElementById('displayTeamName').textContent = state.teamName;
    if (cfg.activityName) {
      const el = document.getElementById('headerBuildingText');
      if (el) el.textContent = cfg.activityName.substring(0,6);
    }
    renderStage();
  } catch(e) {
    hideLoading(); errEl.textContent = '載入失敗，請確認網路連線！'; console.error(e);
  }
}

function shuffleForTeam(arr, teamKey) {
  const seeds={team1:17,team2:31,team3:53,team4:71,team5:89,team6:97};
  const seed=seeds[teamKey]||17;
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=(seed*(i+7)*13)%(i+1);[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function updateProgress() {
  const total=state.stages.length, cur=state.currentIdx;
  let html='';
  for(let i=0;i<total;i++){
    let cls='prog-dot';
    if(i<cur)cls+=' done'; else if(i===cur)cls+=' active';
    html+=`<div class="${cls}"></div>`;
  }
  html+=`<span class="prog-label">第${cur+1}/${total}關</span>`;
  document.getElementById('progressBar').innerHTML=html;
  document.getElementById('displayStageLabel').textContent=`第 ${cur+1} 關`;
  document.getElementById('displayProgress').textContent=`${cur+1}/${total}`;
}

function renderStage() {
  state.selectedOption=null; state.photoFile=null;
  state.stageAttempts=0; state.lastCorrect=false;
  updateProgress();
  const stage = state.stages[state.currentIdx];
  if (!stage) { showFinish(); return; }
  clearInterval(state.timerInterval);
  state.stageSeconds=0;
  state.timerInterval=setInterval(tickTimer,1000);
  set(ref(db,`sessions/${state.sessionKey}/currentStage`),state.currentIdx);
  set(ref(db,`sessions/${state.sessionKey}/stageLogs/${state.currentIdx}/stageName`),stage.title||'');

  const hasGPS = !!(stage.lat&&stage.lng);
  const letters = ['A','B','C','D'];
  const content = document.getElementById('gameContent');
  content.innerHTML = `
    ${hasGPS?`<div class="state-card gps-card" id="gpsCard">
      <div class="gps-icon">📍</div>
      <div class="gps-title">前往指定地點</div>
      <div class="gps-desc" id="gpsHint"></div>
      <button class="btn-gps" id="gpsBtn" onclick="checkGPS()">📡 驗證我的位置</button>
      <div class="gps-status" id="gpsStatus"></div>
    </div>`:''}
    <div class="state-card" id="questionCard" ${hasGPS?'style="display:none"':''}>
      <div class="q-tag">📋 解謎題目</div>
      <div id="stageImgWrap"></div>
      <div class="q-title" id="stageTitle"></div>
      <div class="q-desc" id="stageDesc"></div>
      <div id="hintArea"></div>
      <div onclick="triggerPhoto()" class="photo-upload-area" id="photoArea">
        <div class="icon">📷</div>
        <div class="text">點擊拍照上傳現場照片</div>
      </div>
      <img id="photoPreview" class="photo-preview" alt="照片預覽"/>
      <input type="file" id="photoInput" accept="image/*" capture="environment" onchange="handlePhoto()"/>
      <div class="options-list" id="optionsList">
        ${(stage.options||[]).map((opt,i)=>`
        <button class="option-btn" id="opt${i}" onclick="selectOpt(${i})">
          <div class="opt-letter">${letters[i]}</div>
          <div id="optText${i}"></div>
        </button>`).join('')}
      </div>
      <button class="btn-submit" id="submitBtn" onclick="submitAns()" disabled>確認答案 🐚</button>
    </div>`;

  if (hasGPS) document.getElementById('gpsHint').textContent = stage.locationHint||'請前往指定地點，按下按鈕驗證位置。';
  document.getElementById('stageTitle').textContent = stage.title||'';
  document.getElementById('stageDesc').textContent = stage.description||'';
  (stage.options||[]).forEach((opt,i)=>{
    const el=document.getElementById('optText'+i);
    if(el) el.textContent=opt;
  });
  if (stage.imageUrl) {
    const img=document.createElement('img');
    img.className='q-image'; img.alt='關卡圖片'; img.src=stage.imageUrl;
    document.getElementById('stageImgWrap').appendChild(img);
  }
}

function checkGPS() {
  const stage = state.stages[state.currentIdx];
  const statusEl = document.getElementById('gpsStatus');
  const btn = document.getElementById('gpsBtn');
  btn.disabled=true;
  statusEl.textContent='📡 正在取得GPS位置，請稍候...';
  if (!navigator.geolocation) {
    const gpsFail = state.settings.gpsFail||'block';
    if (gpsFail==='allow') { statusEl.textContent='⚠️ 不支援GPS，直接進入'; setTimeout(arriveAtStage,800); }
    else { statusEl.textContent='⚠️ 此裝置不支援GPS，請聯絡工作人員'; btn.disabled=false; }
    return;
  }
  navigator.geolocation.getCurrentPosition(
    pos => {
      const dist = calcDist(pos.coords.latitude,pos.coords.longitude,stage.lat,stage.lng);
      const passed = dist <= (stage.radius||100);
      recordGPSLog(pos.coords.latitude,pos.coords.longitude,dist,passed,state.currentIdx);
      if (passed) { statusEl.textContent='✅ 位置驗證成功！'; setTimeout(arriveAtStage,800); }
      else { statusEl.textContent=`⚠️ 距離目標還有約 ${Math.round(dist)} 公尺，請再靠近！`; btn.disabled=false; }
    },
    err => {
      const msgs={1:'⚠️ 請允許位置權限後重試',2:'⚠️ GPS訊號不佳，請到空曠處',3:'⚠️ 定位逾時，請重試'};
      statusEl.textContent = msgs[err.code]||'⚠️ 定位失敗，請重試';
      recordGPSLog(null,null,null,false,state.currentIdx);
      const gpsFail = state.settings.gpsFail||'block';
      if (gpsFail==='allow') { setTimeout(()=>{ statusEl.textContent+=' (已自動跳過)'; setTimeout(arriveAtStage,1000); },1500); }
      else btn.disabled=false;
    },
    {enableHighAccuracy:true, timeout:15000, maximumAge:0}
  );
}

function calcDist(lat1,lng1,lat2,lng2){
  const R=6371000,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function arriveAtStage(){
  const g=document.getElementById('gpsCard');
  const q=document.getElementById('questionCard');
  if(g)g.style.display='none';
  if(q)q.style.display='';
  set(ref(db,`sessions/${state.sessionKey}/stageLogs/${state.currentIdx}/arrivedAt`),serverTimestamp());
}

async function recordGPSLog(lat,lng,dist,passed,stageIdx){
  state.gpsLogCount++;
  if (state.gpsLogCount>10) {
    const snap=await get(ref(db,`sessions/${state.sessionKey}/gpsLogs`));
    const logs=snap.val()||{};
    const keys=Object.keys(logs).sort((a,b)=>logs[a].ts-logs[b].ts);
    if (keys.length>=10) set(ref(db,`sessions/${state.sessionKey}/gpsLogs/${keys[0]}`),null);
  }
  const logRef=push(ref(db,`sessions/${state.sessionKey}/gpsLogs`));
  await set(logRef,{lat,lng,dist,passed,stageIdx,ts:Date.now()});
}

function showHint(){
  const stage=state.stages[state.currentIdx];
  const hintAfter=state.settings.hintAfter??2;
  if(hintAfter===0||!stage.hints)return;
  const hintArea=document.getElementById('hintArea');
  if(!hintArea)return;
  const hintNum=Math.min(Math.floor(state.stageAttempts/hintAfter),3);
  if(hintNum<1)return;
  const hints=[stage.hints.h1,stage.hints.h2,stage.hints.h3].filter(Boolean);
  const toShow=hints.slice(0,hintNum);
  if(!toShow.length)return;
  hintArea.innerHTML='';
  toShow.forEach((h,i)=>{
    const box=document.createElement('div'); box.className='hint-box';
    const label=document.createElement('div'); label.className='hint-label'; label.textContent=`💡 提示 ${i+1}`;
    const text=document.createElement('div'); text.textContent=h;
    box.appendChild(label); box.appendChild(text); hintArea.appendChild(box);
  });
}

function triggerPhoto(){document.getElementById('photoInput').click()}
function handlePhoto(){
  const file=document.getElementById('photoInput').files[0];
  if(!file)return;
  if(!file.type.startsWith('image/')){alert('請上傳圖片檔案');return;}
  if(file.size>10*1024*1024){alert('圖片請在10MB以內');return;}
  state.photoFile=file;
  const reader=new FileReader();
  reader.onload=e=>{
    const p=document.getElementById('photoPreview');
    p.src=e.target.result; p.style.display='block';
    document.getElementById('photoArea').style.display='none';
  };
  reader.readAsDataURL(file);
}

function selectOpt(idx){
  state.selectedOption=idx;
  document.querySelectorAll('.option-btn').forEach((b,i)=>b.classList.toggle('selected',i===idx));
  document.getElementById('submitBtn').disabled=false;
}

async function submitAns(){
  if(state.selectedOption===null)return;
  document.getElementById('submitBtn').disabled=true;
  const stage=state.stages[state.currentIdx];
  state.stageAttempts++; state.totalAttempts++;
  const guessHash=await sha256(`${stage.key}_${state.selectedOption}`);
  const correct=(guessHash===stage.answerHash);
  state.lastCorrect=correct;

  if(state.photoFile){
    const path=`photos/${state.sessionKey}/${state.currentIdx}_${Date.now()}`;
    try{
      const snap=await uploadBytes(sRef(storage,path),state.photoFile);
      const url=await getDownloadURL(snap.ref);
      set(ref(db,`sessions/${state.sessionKey}/stageLogs/${state.currentIdx}/photoUrl`),url);
    }catch(e){console.warn('照片上傳失敗',e);}
  }
  set(ref(db,`sessions/${state.sessionKey}/stageLogs/${state.currentIdx}/answeredAt`),serverTimestamp());
  set(ref(db,`sessions/${state.sessionKey}/stageLogs/${state.currentIdx}/correct`),correct);
  set(ref(db,`sessions/${state.sessionKey}/stageLogs/${state.currentIdx}/attempts`),state.stageAttempts);

  document.querySelectorAll('.option-btn').forEach((b,i)=>{
    b.classList.remove('selected','correct','wrong');
    if(i===state.selectedOption)b.classList.add(correct?'correct':'wrong');
  });
  if(!correct) showHint();

  document.getElementById('feedbackIcon').textContent=correct?'🎉':'😅';
  document.getElementById('feedbackTitle').textContent=correct?'答對了！':'再想想看！';
  document.getElementById('feedbackTitle').className='feedback-title '+(correct?'correct':'wrong');
  document.getElementById('feedbackMsg').textContent=correct?'太棒了！準備前往下一關！':'不對唷，再仔細看看！';
  const btn=document.getElementById('feedbackBtn');
  btn.textContent=correct?'前往下一關 →':'再試一次 →';
  btn.className=correct?'btn-next':'btn-retry';
  document.getElementById('feedbackOverlay').classList.remove('hidden');
}

function closeFeedback(){
  document.getElementById('feedbackOverlay').classList.add('hidden');
  if(state.lastCorrect){
    clearInterval(state.timerInterval);
    set(ref(db,`sessions/${state.sessionKey}/stageLogs/${state.currentIdx}/stageSec`),state.stageSeconds);
    state.currentIdx++;
    if(state.currentIdx>=state.stages.length){showFinish();return;}
    renderStage();
  } else {
    state.selectedOption=null;
    document.querySelectorAll('.option-btn').forEach(b=>b.classList.remove('selected','correct','wrong'));
    document.getElementById('submitBtn').disabled=true;
  }
}

function showFinish(){
  clearInterval(state.timerInterval);
  const elapsed=Math.floor((Date.now()-state.gameStartTime)/1000);
  const t=`${String(Math.floor(elapsed/60)).padStart(2,'0')}:${String(elapsed%60).padStart(2,'0')}`;
  set(ref(db,`sessions/${state.sessionKey}/status`),'finished');
  set(ref(db,`sessions/${state.sessionKey}/totalSec`),elapsed);
  set(ref(db,`sessions/${state.sessionKey}/finishedAt`),serverTimestamp());
  document.getElementById('finishTeamName').textContent=state.teamName;
  document.getElementById('finishStages').textContent=state.stages.length;
  document.getElementById('finishTime').textContent=t;
  document.getElementById('finishAttempts').textContent=state.totalAttempts;
  document.getElementById('finishMsg').textContent=state.settings.finishMsg||'🐚 恭喜完成所有挑戰！感謝參與！';
  showScreen('finishScreen');
}

function tickTimer(){
  state.stageSeconds++;
  state.totalSeconds=Math.floor((Date.now()-state.gameStartTime)/1000);
  const ss=state.stageSeconds,ts=state.totalSeconds;
  document.getElementById('stageTimer').textContent=`${String(Math.floor(ss/60)).padStart(2,'0')}:${String(ss%60).padStart(2,'0')}`;
  document.getElementById('totalTimer').textContent=`${String(Math.floor(ts/60)).padStart(2,'0')}:${String(ts%60).padStart(2,'0')}`;
  if(ts%10===0)set(ref(db,`sessions/${state.sessionKey}/totalSec`),ts);
}
</script>
